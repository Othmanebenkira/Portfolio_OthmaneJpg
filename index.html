<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Othmane.jpg - Photo Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="images/photo-camera-svgrepo-com.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <a class="logo" href="#top">Othmane.jpg</a>
        <nav class="nav">
          <a href="#gallery">Gallery</a>
          <a href="#contact">Contact</a>
        </nav>
        <!-- <a class="cta" href="#contact">Book a shoot</a> -->
      </header>

      <main id="top">
        <section class="hero">
          <div class="hero-text">
            <p class="eyebrow">Visual storyteller</p>
            <h1>Images that breathe.</h1>
            <p class="lede">
             A cinematic collection of portraits and landscapes…
my peaceful little side quest while the main storyline involves generative AI speedrunning its attempt to replace me as a software engineer.
            </p>
          
          </div>
          <div class="hero-card">
            <img class="hero-photo" src="images/common/img0.jpg" alt="City Light featured series" />
            <div class="hero-caption">
            </div>
          </div>
        </section>

        <section id="gallery" class="gallery">
      
          <div class="grid">
            <figure class="tile tall">
              <a class="tile-link" href="page-1.html" aria-label="Open the château gallery">
                <img src="images/common/img1.jpg" alt="Château de Pierrefonds" />
              </a>
              <figcaption>Château de Pierrefonds </figcaption>
            </figure>
            <figure class="tile">
              <a class="tile-link" href="page-2.html" aria-label="Open the Lyon gallery">
                <img src="images/common/img2.jpg" alt="Lyon" />
              </a>
              <figcaption>Lyon</figcaption>
            </figure>
            <figure class="tile">
              <a class="tile-link" href="page-3.html" aria-label="Open the Finland gallery">
                <img src="images/common/img3.jpg" alt="Finland with fog" />
              </a>
              <figcaption>Finland</figcaption>
            </figure>
            <figure class="tile wide">
              <a class="tile-link" href="page-4.html" aria-label="Open the WEI_A25_UTC gallery">
                <img src="images/common/img4.jpg" alt="WEI_A25_UTC" />
              </a>
              <figcaption>Wei A25 UTC</figcaption>
            </figure>
            <figure class="tile">
              <a class="tile-link" href="page-5.html" aria-label="Open the details gallery">
                <img src="images/photo-05.jpg" alt="Cafe interior" />
              </a>
              <figcaption>Details</figcaption>
            </figure>
            <figure class="tile">
              <a class="tile-link" href="page-6.html" aria-label="Open the night gallery">
                <img src="images/photo-06.jpg" alt="Night reflections" />
              </a>
              <figcaption>Night</figcaption>
            </figure>
          </div>
        </section>
      </main>

      <footer id="contact" class="site-footer">
        <div class="footer-links">
          <a href="https://www.instagram.com/othmane_.jpg/" target="_blank" rel="noreferrer">Instagram</a>
          <a href="https://www.tiktok.com/@othmane_.jpg" target="_blank" rel="noreferrer">Tiktok</a>
          <a href="mailto:othmanejpg@gmail.com">Email</a>
        </div>
      </footer>
    </div>
  </body>
  <script src="orientation.js"></script>
</html>
